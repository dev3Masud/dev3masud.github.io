<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>dev3Masud · GitHub Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2300d4aa' d='M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.7-2.8 5.7-5.5 6 .4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3'/%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #0d1117;
    --bg-soft: #161b22;
    --bg-card: #161b22;
    --border: #30363d;
    --border-soft: #21262d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #6e7681;
    --accent: #00d4aa;
    --accent-dim: rgba(0, 212, 170, 0.15);
    --blue: #58a6ff;
    --purple: #bc8cff;
    --yellow: #d29922;
    --red: #f85149;
    --green: #3fb950;
    --orange: #ff8c42;
    --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .bg-grid {
    position: fixed; inset: 0; z-index: -1;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(0, 212, 170, 0.08), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(88, 166, 255, 0.06), transparent 40%);
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #0d1117;
    box-shadow: 0 0 24px rgba(0, 212, 170, 0.3);
  }
  .brand h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand p {
    font-size: 12px;
    color: var(--text-muted);
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-dim);
  }
  .pill.active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* Profile */
  .profile {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 24px;
  }
  .avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px solid var(--border);
    object-fit: cover;
    background: var(--bg-soft);
  }
  .profile-info { flex: 1; min-width: 0; }
  .profile-name {
    font-size: 20px;
    font-weight: 600;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .profile-login { color: var(--text-muted); font-weight: 400; font-size: 16px; }
  .profile-bio { color: var(--text-muted); margin-top: 4px; }
  .profile-meta {
    display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap;
    color: var(--text-muted); font-size: 12px;
  }
  .profile-meta span { display: inline-flex; align-items: center; gap: 6px; }
  .profile-meta strong { color: var(--text); font-weight: 600; }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent);
  }
  .stat.blue::before { background: var(--blue); }
  .stat.purple::before { background: var(--purple); }
  .stat.yellow::before { background: var(--yellow); }
  .stat.orange::before { background: var(--orange); }
  .stat-label {
    color: var(--text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    margin-top: 6px;
    letter-spacing: -0.02em;
  }
  .stat-sub {
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 4px;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search {
    flex: 1;
    min-width: 240px;
    position: relative;
  }
  .search input {
    width: 100%;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px 10px 38px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .search input:focus { border-color: var(--accent); }
  .search input::placeholder { color: var(--text-dim); }
  .search svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
  }
  .select {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
  }
  .select:focus { border-color: var(--accent); }

  /* Repo list */
  .repos {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 14px;
  }
  .repo {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .repo:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .repo-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }
  .repo-icon {
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .repo-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--blue);
    word-break: break-word;
  }
  .repo-name:hover { text-decoration: underline; }
  .repo-desc {
    color: var(--text-muted);
    font-size: 13px;
    margin: 4px 0 12px;
    min-height: 20px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .repo-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
  }
  .tag.pages {
    background: rgba(63, 185, 80, 0.12);
    border-color: rgba(63, 185, 80, 0.35);
    color: var(--green);
  }
  .tag.fork {
    background: rgba(188, 140, 255, 0.1);
    border-color: rgba(188, 140, 255, 0.3);
    color: var(--purple);
  }
  .tag.archived {
    background: rgba(255, 140, 66, 0.1);
    border-color: rgba(255, 140, 66, 0.3);
    color: var(--orange);
  }
  .tag.private {
    background: rgba(210, 153, 34, 0.1);
    border-color: rgba(210, 153, 34, 0.3);
    color: var(--yellow);
  }
  .tag.template {
    background: rgba(88, 166, 255, 0.1);
    border-color: rgba(88, 166, 255, 0.3);
    color: var(--blue);
  }
  .repo-footer {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: auto;
    color: var(--text-muted);
    font-size: 12px;
    flex-wrap: wrap;
  }
  .repo-footer span { display: inline-flex; align-items: center; gap: 4px; }
  .lang-dot {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block;
  }
  .pages-link {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--green);
    font-size: 12px;
    font-weight: 500;
  }
  .pages-link:hover { text-decoration: underline; }

  /* Empty / Loading / Error */
  .state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    color: var(--red);
    background: rgba(248, 81, 73, 0.08);
    border: 1px solid rgba(248, 81, 73, 0.3);
    padding: 16px;
    border-radius: 8px;
    display: inline-block;
  }

  /* Footer */
  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border-soft);
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }
  .footer a { color: var(--text-muted); }

  @media (max-width: 640px) {
    .container { padding: 20px 16px; }
    .repos { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat-value { font-size: 22px; }
    .profile { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="container">

  <header class="header">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div>
        <h1>GitHub Dashboard</h1>
        <p>Live activity &amp; repository overview</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="pill" id="refreshBtn" title="Refresh data">
        <span class="dot"></span>
        <span id="refreshLabel">Refresh</span>
      </button>
      <button class="pill" id="pagesOnlyBtn" title="Show only repos with GitHub Pages">
        <span class="dot"></span>
        Pages only
      </button>
      <button class="pill" id="showHiddenBtn" title="Show username and dashboard host repos">
        <span class="dot"></span>
        Show all
      </button>
    </div>
  </header>

  <section class="profile" id="profile">
    <div class="state" style="width:100%;">
      <div class="spinner"></div>
      Loading profile…
    </div>
  </section>

  <section class="stats" id="stats"></section>

  <div class="toolbar">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M10.68 11.74a6 6 0 0 1-7.92-9.04 6 6 0 0 1 9.04 7.92l3.42 3.42a.75.75 0 1 1-1.06 1.06l-3.42-3.42ZM11.5 7a4.5 4.5 0 1 0-9 0 4.5 4.5 0 0 0 9 0Z"/></svg>
      <input type="text" id="searchInput" placeholder="Search repositories by name, description, or language…" />
    </div>
    <select class="select" id="sortSelect">
      <option value="updated">Last updated</option>
      <option value="created">Newest</option>
      <option value="stars">Most stars</option>
      <option value="name">Name (A→Z)</option>
    </select>
  </div>

  <section class="repos" id="repos">
    <div class="state"><div class="spinner"></div>Loading repositories…</div>
  </section>

  <footer class="footer">
    <p>
      Data from <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener">GitHub REST API</a>
      · Updated <span id="lastUpdated">—</span>
      · <a href="https://github.com/dev3Masud" target="_blank" rel="noopener">@dev3Masud</a>
    </p>
  </footer>
</div>

<script>
(function () {
  const USERNAME = 'dev3Masud';
  const HOST_REPO = `${USERNAME}.github.io`;
  const CACHE_KEY = 'gh_dash_cache_v1';
  const CACHE_TTL = 5 * 60 * 1000;

  const langColors = {
    JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5', Java: '#b07219',
    'C++': '#f34b7d', C: '#555555', 'C#': '#178600', Go: '#00ADD8', Rust: '#dea584',
    Ruby: '#701516', PHP: '#4F5D95', HTML: '#e34c26', CSS: '#563d7c', SCSS: '#c6538c',
    Shell: '#89e051', Vue: '#41b883', Svelte: '#ff3e00', Swift: '#F05138', Kotlin: '#A97BFF',
    Dart: '#00B4AB', Lua: '#000080', Elixir: '#6e4a7e', Haskell: '#5e5086', R: '#198CE7'
  };

  const state = {
    user: null,
    repos: [],
    filtered: [],
    showHidden: false,
    pagesOnly: false,
    query: '',
    sort: 'updated'
  };

  const $ = id => document.getElementById(id);
  const reposEl = $('repos');
  const statsEl = $('stats');
  const profileEl = $('profile');
  const searchInput = $('searchInput');
  const sortSelect = $('sortSelect');
  const lastUpdatedEl = $('lastUpdated');
  const refreshBtn = $('refreshBtn');
  const refreshLabel = $('refreshLabel');
  const pagesOnlyBtn = $('pagesOnlyBtn');
  const showHiddenBtn = $('showHiddenBtn');

  function timeAgo(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    const s = Math.floor((Date.now() - d.getTime()) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    if (s < 2592000) return `${Math.floor(s/86400)}d ago`;
    if (s < 31536000) return `${Math.floor(s/2592000)}mo ago`;
    return `${Math.floor(s/31536000)}y ago`;
  }

  function num(n) {
    if (n == null) return '0';
    if (n >= 1000) return (n/1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/,'') + 'k';
    return String(n);
  }

  function loadCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const data = JSON.parse(raw);
      if (Date.now() - data.ts > CACHE_TTL) return null;
      return data;
    } catch { return null; }
  }
  function saveCache(data) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {}
  }

  async function fetchAllRepos() {
    let all = [], page = 1;
    while (true) {
      const res = await fetch(`https://api.github.com/users/${USERNAME}/repos?per_page=100&page=${page}&type=owner&sort=updated`);
      if (!res.ok) throw new Error(`GitHub API error: ${res.status} ${res.statusText}`);
      const batch = await res.json();
      if (!Array.isArray(batch) || batch.length === 0) break;
      all = all.concat(batch);
      if (batch.length < 100) break;
      page++;
    }
    return all;
  }

  async function loadData(force = false) {
    if (!force) {
      const cached = loadCache();
      if (cached) {
        state.user = cached.data.user;
        state.repos = cached.data.repos;
        renderAll();
      }
    }
    refreshLabel.textContent = 'Refreshing…';
    refreshBtn.disabled = true;
    try {
      const [userRes, repos] = await Promise.all([
        fetch(`https://api.github.com/users/${USERNAME}`).then(r => r.ok ? r.json() : null),
        fetchAllRepos()
      ]);
      state.user = userRes;
      state.repos = repos;
      saveCache({ user: state.user, repos: state.repos });
      renderAll();
      lastUpdatedEl.textContent = new Date().toLocaleTimeString();
    } catch (err) {
      if (state.repos.length === 0) {
        reposEl.innerHTML = `<div class="state"><div class="error">⚠ ${err.message}<br><br>GitHub API rate limit may have been hit (60 req/hr for unauthenticated requests).<br>Try again in a few minutes.</div></div>`;
      }
      console.error(err);
    } finally {
      refreshLabel.textContent = 'Refresh';
      refreshBtn.disabled = false;
    }
  }

  function renderProfile() {
    if (!state.user) return;
    const u = state.user;
    profileEl.innerHTML = `
      <img class="avatar" src="${u.avatar_url}" alt="${u.login}" />
      <div class="profile-info">
        <div class="profile-name">
          ${u.name || u.login}
          <span class="profile-login">@${u.login}</span>
        </div>
        ${u.bio ? `<div class="profile-bio">${escape(u.bio)}</div>` : ''}
        <div class="profile-meta">
          ${u.company ? `<span>🏢 ${escape(u.company)}</span>` : ''}
          ${u.location ? `<span>📍 ${escape(u.location)}</span>` : ''}
          ${u.blog ? `<span>🔗 <a href="${u.blog.startsWith('http') ? u.blog : 'https://' + u.blog}" target="_blank" rel="noopener">${escape(u.blog)}</a></span>` : ''}
          <span>👥 <strong>${u.followers}</strong> followers · <strong>${u.following}</strong> following</span>
          <span>📦 <strong>${u.public_repos}</strong> public repos</span>
        </div>
      </div>
    `;
  }

  function renderStats() {
    const total = state.repos.length;
    const withPages = state.repos.filter(r => r.has_pages).length;
    const totalStars = state.repos.reduce((s, r) => s + (r.stargazers_count || 0), 0);
    const totalForks = state.repos.reduce((s, r) => s + (r.forks_count || 0), 0);
    const languages = new Set(state.repos.map(r => r.language).filter(Boolean));
    statsEl.innerHTML = `
      <div class="stat"><div class="stat-label">Repositories</div><div class="stat-value">${total}</div><div class="stat-sub">Total tracked</div></div>
      <div class="stat green" style="--accent:var(--green)"><div class="stat-label">GitHub Pages</div><div class="stat-value">${withPages}</div><div class="stat-sub">Repos with live sites</div></div>
      <div class="stat yellow"><div class="stat-label">Stars Earned</div><div class="stat-value">${num(totalStars)}</div><div class="stat-sub">Across all repos</div></div>
      <div class="stat purple"><div class="stat-label">Forks</div><div class="stat-value">${num(totalForks)}</div><div class="stat-sub">Community copies</div></div>
      <div class="stat blue"><div class="stat-label">Languages</div><div class="stat-value">${languages.size}</div><div class="stat-sub">Unique</div></div>
    `;
  }

  function escape(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  function applyFilters() {
    let list = state.repos.slice();
    if (!state.showHidden) {
      list = list.filter(r => {
        if (r.fork) return true;
        if (/^[a-z0-9_.-]+\.github\.io$/i.test(r.name)) return false;
        if (r.name.toLowerCase() === HOST_REPO.toLowerCase()) return false;
        return true;
      });
    }
    if (state.pagesOnly) list = list.filter(r => r.has_pages);
    if (state.query) {
      const q = state.query.toLowerCase();
      list = list.filter(r =>
        (r.name || '').toLowerCase().includes(q) ||
        (r.description || '').toLowerCase().includes(q) ||
        (r.language || '').toLowerCase().includes(q)
      );
    }
    switch (state.sort) {
      case 'stars': list.sort((a,b) => (b.stargazers_count||0) - (a.stargazers_count||0)); break;
      case 'created': list.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)); break;
      case 'name': list.sort((a,b) => (a.name||'').localeCompare(b.name||'')); break;
      default: list.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
    }
    state.filtered = list;
  }

  function repoCard(r) {
    const langColor = langColors[r.language] || '#8b949e';
    const tags = [];
    if (r.has_pages) tags.push(`<span class="tag pages" title="GitHub Pages is enabled">⚡ Pages</span>`);
    if (r.fork) tags.push(`<span class="tag fork">⑂ Fork</span>`);
    if (r.archived) tags.push(`<span class="tag archived">📦 Archived</span>`);
    if (r.is_template) tags.push(`<span class="tag template">📋 Template</span>`);
    if (r.private) tags.push(`<span class="tag private">🔒 Private</span>`);

    const pagesUrl = r.has_pages ? `https://${USERNAME}.github.io/${r.name}/` : null;
    const isUserSite = /^[a-z0-9_.-]+\.github\.io$/i.test(r.name);

    return `
      <article class="repo">
        <div class="repo-header">
          <svg class="repo-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.25.25 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"/></svg>
          <a class="repo-name" href="${r.html_url}" target="_blank" rel="noopener">${escape(r.name)}</a>
        </div>
        ${r.description ? `<div class="repo-desc">${escape(r.description)}</div>` : `<div class="repo-desc" style="opacity:0.4;">No description</div>`}
        <div class="repo-tags">${tags.join('')}</div>
        <div class="repo-footer">
          ${r.language ? `<span><span class="lang-dot" style="background:${langColor}"></span>${escape(r.language)}</span>` : ''}
          <span title="Stars">⭐ ${num(r.stargazers_count)}</span>
          <span title="Forks">🍴 ${num(r.forks_count)}</span>
          <span title="Last updated">🕒 ${timeAgo(r.updated_at)}</span>
          ${pagesUrl && !isUserSite ? `<a class="pages-link" href="${pagesUrl}" target="_blank" rel="noopener" title="Open live site">↗ Visit</a>` : ''}
        </div>
      </article>
    `;
  }

  function renderRepos() {
    applyFilters();
    if (state.filtered.length === 0) {
      reposEl.innerHTML = `<div class="state">No repositories match your filters.</div>`;
      return;
    }
    reposEl.innerHTML = state.filtered.map(repoCard).join('');
  }

  function renderAll() {
    renderProfile();
    renderStats();
    renderRepos();
  }

  searchInput.addEventListener('input', e => { state.query = e.target.value; renderRepos(); });
  sortSelect.addEventListener('change', e => { state.sort = e.target.value; renderRepos(); });
  refreshBtn.addEventListener('click', () => loadData(true));
  pagesOnlyBtn.addEventListener('click', () => {
    state.pagesOnly = !state.pagesOnly;
    pagesOnlyBtn.classList.toggle('active', state.pagesOnly);
    renderRepos();
  });
  showHiddenBtn.addEventListener('click', () => {
    state.showHidden = !state.showHidden;
    showHiddenBtn.classList.toggle('active', state.showHidden);
    showHiddenBtn.querySelector('span:last-child').textContent = state.showHidden ? 'Showing all' : 'Show all';
    renderRepos();
  });

  loadData();
  setInterval(() => loadData(true), 10 * 60 * 1000);
})();
</script>
</body>
</html>
