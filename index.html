<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dev3Masud — GitHub Dashboard</title>
    <meta name="description" content="GitHub activity dashboard for dev3Masud — Track repositories, contributions, and GitHub Pages deployments.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <!-- Animated background -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- Header -->
    <header id="dashboard-header">
        <div class="header-content">
            <div class="header-left">
                <div class="logo-mark">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                    </svg>
                </div>
                <div class="header-text">
                    <h1 id="dashboard-title">GitHub Dashboard</h1>
                    <p class="header-subtitle" id="header-username">Loading...</p>
                </div>
            </div>
            <div class="header-right">
                <div class="search-box" id="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="repo-search" placeholder="Search repositories..." autocomplete="off">
                </div>
                <a href="" id="github-profile-link" class="btn-profile" target="_blank" rel="noopener noreferrer">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    View Profile
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
        <!-- Profile Section -->
        <section class="profile-section" id="profile-section">
            <div class="profile-card glass-card">
                <div class="profile-avatar-wrapper">
                    <img id="profile-avatar" src="" alt="GitHub Avatar" class="profile-avatar">
                    <div class="avatar-ring"></div>
                </div>
                <div class="profile-info">
                    <h2 id="profile-name" class="profile-name">Loading...</h2>
                    <p id="profile-bio" class="profile-bio"></p>
                    <div class="profile-meta">
                        <span id="profile-location" class="meta-item hidden">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            <span></span>
                        </span>
                        <span id="profile-company" class="meta-item hidden">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                            <span></span>
                        </span>
                        <span id="profile-joined" class="meta-item">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            <span></span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card glass-card" id="stat-repos">
                    <div class="stat-icon stat-icon-repos">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    </div>
                    <div class="stat-value" id="stat-repos-value">—</div>
                    <div class="stat-label">Public Repos</div>
                </div>
                <div class="stat-card glass-card" id="stat-followers">
                    <div class="stat-icon stat-icon-followers">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    </div>
                    <div class="stat-value" id="stat-followers-value">—</div>
                    <div class="stat-label">Followers</div>
                </div>
                <div class="stat-card glass-card" id="stat-following">
                    <div class="stat-icon stat-icon-following">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                    </div>
                    <div class="stat-value" id="stat-following-value">—</div>
                    <div class="stat-label">Following</div>
                </div>
                <div class="stat-card glass-card" id="stat-pages">
                    <div class="stat-icon stat-icon-pages">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    </div>
                    <div class="stat-value" id="stat-pages-value">—</div>
                    <div class="stat-label">GitHub Pages</div>
                </div>
            </div>
        </section>

        <!-- Recent Activity Section -->
        <section class="activity-section" id="activity-section">
            <div class="section-header">
                <h2 class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    Recent Activity
                </h2>
            </div>
            <div class="activity-timeline glass-card" id="activity-timeline">
                <div class="loading-skeleton">
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
            </div>
        </section>

        <!-- Language Distribution -->
        <section class="languages-section" id="languages-section">
            <div class="section-header">
                <h2 class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                    Language Distribution
                </h2>
            </div>
            <div class="languages-chart glass-card" id="languages-chart">
                <div class="loading-skeleton">
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
            </div>
        </section>

        <!-- Repositories Section -->
        <section class="repos-section" id="repos-section">
            <div class="section-header">
                <h2 class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    Repositories
                </h2>
                <div class="filter-controls">
                    <button class="filter-btn active" id="filter-all" data-filter="all">All</button>
                    <button class="filter-btn" id="filter-pages" data-filter="pages">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        GitHub Pages
                    </button>
                    <button class="filter-btn" id="filter-source" data-filter="source">Source</button>
                    <button class="filter-btn" id="filter-forked" data-filter="forked">Forked</button>
                    <div class="sort-control">
                        <select id="sort-select">
                            <option value="updated">Recently Updated</option>
                            <option value="stars">Most Stars</option>
                            <option value="name">Name (A-Z)</option>
                            <option value="created">Recently Created</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="repos-grid" id="repos-grid">
                <div class="loading-skeleton">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </div>
            <div class="repos-empty hidden" id="repos-empty">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <p>No repositories found matching your criteria</p>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer id="dashboard-footer">
        <div class="footer-content">
            <p>Built with 💜 using the <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener noreferrer">GitHub API</a></p>
            <p class="footer-update" id="footer-update">Last updated: —</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
