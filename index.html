<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dev3Masud · GitHub Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2300d4aa' d='M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.7-2.8 5.7-5.5 6 .4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3'/%3E%3C/svg%3E" />

  <!-- SEO -->
  <meta name="description" content="dev3Masud — GitHub Dashboard. Live GitHub stats, repositories, contributions, and deployments.">
  <meta name="keywords" content="dev3Masud, GitHub, Dashboard, Python, Security, Automation, DNS Blocklist">
  <meta name="author" content="dev3Masud">
  <meta property="og:type" content="website">
  <meta property="og:title" content="dev3Masud | GitHub Dashboard">
  <meta property="og:description" content="Next-level live GitHub dashboard with real-time stats, repository tracking, and deployments.">
  <meta property="og:url" content="https://dev3masud.github.io/">
  <meta property="og:image" content="https://github.com/dev3Masud.png">
  <meta name="theme-color" content="#0a0b10">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style-v4.css?v=4.2">
</head>
<body>

  <!-- Animated background -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
    <canvas id="particle-canvas"></canvas>
  </div>

  <!-- NAVIGATION -->
  <header id="site-header">
    <div class="nav-inner">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div>
          <h1>GitHub Dashboard</h1>
          <p>Live activity &amp; repository overview</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="pill" id="refreshBtn" title="Refresh data">
          <span class="dot"></span>
          <span id="refreshLabel">Refresh</span>
        </button>
        <button class="pill" id="pagesOnlyBtn" title="Show only repos with GitHub Pages">
          <span class="dot"></span>
          Pages only
        </button>
        <button class="pill" id="showHiddenBtn" title="Show username and dashboard host repos">
          <span class="dot"></span>
          Show all
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="profile" id="profile">
      <div class="state" style="width:100%;">
        <div class="spinner"></div>
        Loading profile…
      </div>
    </section>

    <section class="stats" id="stats"></section>

    <div class="toolbar">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M10.68 11.74a6 6 0 0 1-7.92-9.04 6 6 0 0 1 9.04 7.92l3.42 3.42a.75.75 0 1 1-1.06 1.06l-3.42-3.42ZM11.5 7a4.5 4.5 0 1 0-9 0 4.5 4.5 0 0 0 9 0Z"/></svg>
        <input type="text" id="searchInput" placeholder="Search repositories by name, description, or language…" />
      </div>
      <select class="select" id="sortSelect">
        <option value="updated">Last updated</option>
        <option value="created">Newest</option>
        <option value="stars">Most stars</option>
        <option value="name">Name (A→Z)</option>
      </select>
    </div>

    <section class="repos" id="repos">
      <div class="state"><div class="spinner"></div>Loading repositories…</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-copy">
        Data from <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener">GitHub REST API</a>
        · Updated <span id="lastUpdated">—</span>
        · <a href="https://github.com/dev3Masud" target="_blank" rel="noopener">@dev3Masud</a>
        · <a href="mailto:devmasud@proton.me">devmasud@proton.me</a>
      </p>
      <div class="footer-links">
        <a href="https://github.com/dev3Masud" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
        </a>
        <a href="mailto:devmasud@proton.me" aria-label="Email">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </a>
      </div>
    </div>
  </footer>

  <script src="script-v4.js?v=4.2"></script>
</body>
</html>
